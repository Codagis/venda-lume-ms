<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório - Contas</title>
    <style>
        @page { size: A4; margin: 20mm; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 8pt; color: #333; padding: 14px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 2px solid #1a365d; margin-bottom: 14px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo { width: 64px; height: 64px; overflow: hidden; flex-shrink: 0; }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        .logo-placeholder { width: 64px; height: 64px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #64748b; }
        .empresa-info h1 { font-size: 14pt; color: #1a365d; font-weight: 700; }
        .report-title { font-size: 11pt; color: #1a365d; font-weight: 600; }
        .report-title .date { font-size: 8pt; color: #64748b; margin-top: 2px; }
        .summary-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px 14px; margin-bottom: 12px; }
        .summary-box .row { display: flex; gap: 24px; flex-wrap: wrap; }
        .summary-box .item { font-size: 9pt; }
        .summary-box .item .label { color: #64748b; }
        .summary-box .item .value { font-weight: 700; color: #1e293b; }
        table { width: 100%; border-collapse: collapse; font-size: 8pt; }
        thead th { background: #1a365d; color: #fff; font-weight: 600; text-align: left; padding: 6px 6px; }
        tbody td { padding: 5px 6px; border-bottom: 1px solid #e2e8f0; }
        .text-right { text-align: right; }
        .footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid #e2e8f0; font-size: 8pt; color: #94a3b8; text-align: center; }
        .empty-state { text-align: center; padding: 24px; color: #64748b; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-left">
        <div th:if="${logoUrl != null}" class="logo"><img th:src="${logoUrl}" alt="Logo" /></div>
        <div th:if="${logoUrl == null}" class="logo logo-placeholder">LOGO</div>
        <div class="empresa-info">
            <h1 th:text="${nomeEmpresa}">Empresa</h1>
        </div>
    </div>
    <div class="report-title">
        <span th:text="${reportTitle}">Relatório</span>
        <div class="date" th:text="'Gerado em ' + ${dataGeracao}">—</div>
    </div>
</div>

<div class="summary-box">
    <div class="row">
        <div class="item"><span class="label">Total geral:</span> <span class="value" th:text="${totalGeral}">0,00</span></div>
        <div class="item"><span class="label">Pago/Recebido:</span> <span class="value" th:text="${totalPagoRecebido}">0,00</span></div>
        <div class="item"><span class="label">Pendente:</span> <span class="value" th:text="${totalPendente}">0,00</span></div>
    </div>
</div>

<div th:if="${rows != null and !rows.isEmpty()}">
    <table>
        <thead>
            <tr>
                <th>Fornecedor/Cliente</th>
                <th>Descrição</th>
                <th>Vencimento</th>
                <th class="text-right">Valor</th>
                <th class="text-right">Pago/Recebido</th>
                <th class="text-right">Pendente</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.partyName}">—</td>
                <td th:text="${row.description}">—</td>
                <td th:text="${row.dueDate}">—</td>
                <td class="text-right" th:text="${row.amount}">—</td>
                <td class="text-right" th:text="${row.paidReceived}">—</td>
                <td class="text-right" th:text="${row.pending}">—</td>
                <td th:text="${row.status}">—</td>
            </tr>
        </tbody>
    </table>
</div>
<div th:if="${rows == null or rows.isEmpty()}" class="empty-state">Nenhum registro encontrado para o filtro selecionado.</div>

<div class="footer">Documento gerado pelo VendaLume · <span th:text="${dataGeracao}">—</span></div>
</body>
</html>
