<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comanda - Cozinha</title>
    <style>
        @page { size: 80mm 297mm; margin: 5mm; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", monospace; }
        body { background: #fff; margin: 0; padding: 0; font-family: "Courier New", monospace; }
        .receipt {
            background: #fff;
            width: 70mm;
            max-width: 100%;
            padding: 12px 14px;
            color: #000;
            font-size: 10px;
            line-height: 1.5;
        }
        .center { text-align: center; }
        .divider { border-top: 1px dashed #000; margin: 10px 0; }
        .logo { margin: 0 auto 8px; display: block; text-align: center; }
        .logo img { max-width: 56px; max-height: 56px; object-fit: contain; }
        .titulo { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .mesa-numero { font-size: 14px; font-weight: 700; margin: 6px 0; }
        .items-table { width: 100%; border-collapse: collapse; font-size: 10px; margin: 10px 0; }
        .items-table th, .items-table td { text-align: left; padding: 4px 6px; border-bottom: 1px solid #ddd; }
        .items-table td:last-child, .items-table th:last-child { text-align: right; }
        .obs-box { margin-top: 10px; padding: 8px; background: #fffacd; border: 1px solid #e6db55; font-size: 10px; }
        .footer { margin-top: 12px; font-size: 9px; text-align: center; }
    </style>
</head>
<body>
<div class="receipt">
    <div class="center">
        <div th:if="${logoUrl != null}" class="logo">
            <img th:src="${logoUrl}" alt="Logo" />
        </div>
        <div th:if="${logoUrl == null}" class="logo" style="width:56px;height:56px;background:#eee;line-height:56px;color:#999;font-size:9px;margin:0 auto;">LOGO</div>
        <div th:text="${nomeEstabelecimento}">Estabelecimento</div>
        <div class="divider"></div>
        <div class="titulo">Comanda - Cozinha</div>
        <div class="mesa-numero">Mesa: <span th:text="${mesa}">—</span></div>
        <div>Comanda #<span th:text="${numeroComanda}">—</span></div>
        <div th:text="|Aberto em ${dataHora}|">—</div>
    </div>

    <div class="divider"></div>

    <table class="items-table">
        <thead>
            <tr>
                <th>QTD</th>
                <th>DESCRIÇÃO</th>
                <th>VALOR</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${itens}">
                <td th:text="${item.quantidade}">0</td>
                <td th:text="${item.descricao}">—</td>
                <td th:text="${'R$ ' + item.valorTotal}">R$ 0,00</td>
            </tr>
        </tbody>
    </table>

    <div class="divider"></div>
    <div><strong>Total: R$ <span th:text="${valorTotal}">0,00</span></strong></div>

    <div th:if="${temObservacoes}" class="divider"></div>
    <div th:if="${temObservacoes}" class="obs-box">
        <strong>OBS.:</strong><br>
        <span th:text="${observacoes}">—</span>
    </div>

    <div class="divider"></div>
    <div class="footer">Documento para uso interno - Cozinha</div>
</div>
</body>
</html>
