<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comprovante de Pagamento</title>
    <style>
        @page { size: A4; margin: 20mm; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 11pt; color: #1e293b; padding: 24px; max-width: 210mm; margin: 0 auto; }
        .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 16px; border-bottom: 3px solid #0e7490; margin-bottom: 24px; }
        .logo { width: 72px; height: 72px; overflow: hidden; flex-shrink: 0; }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        .logo-placeholder { width: 72px; height: 72px; background: #e0f2fe; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #0e7490; font-weight: 600; }
        .empresa-info h1 { font-size: 18pt; color: #0c4a6e; font-weight: 700; }
        .doc-title { font-size: 20pt; font-weight: 700; color: #0e7490; text-align: center; margin: 24px 0 8px; }
        .doc-subtitle { text-align: center; color: #64748b; font-size: 10pt; margin-bottom: 28px; }
        .box { background: #f0fdfa; border: 1px solid #99f6e4; border-radius: 8px; padding: 20px 24px; margin: 16px 0; }
        .box-label { font-size: 9pt; color: #0d9488; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .box-value { font-size: 16pt; font-weight: 700; color: #134e4a; }
        .row { display: flex; flex-wrap: wrap; gap: 24px 48px; margin: 12px 0; }
        .field { flex: 1 1 200px; }
        .field-label { font-size: 9pt; color: #64748b; margin-bottom: 2px; }
        .field-value { font-size: 11pt; font-weight: 500; }
        .divider { border-top: 1px dashed #cbd5e1; margin: 20px 0; }
        .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 9pt; color: #94a3b8; text-align: center; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10pt; font-weight: 600; }
        .status-PAID { background: #d1fae5; color: #065f46; }
        .status-PARTIAL { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
<div class="header">
    <div style="display: flex; align-items: center; gap: 16px;">
        <div th:if="${logoUrl != null}" class="logo"><img th:src="${logoUrl}" alt="Logo" /></div>
        <div th:if="${logoUrl == null}" class="logo logo-placeholder">LOGO</div>
        <div class="empresa-info">
            <h1 th:text="${nomeEmpresa}">Empresa</h1>
        </div>
    </div>
</div>

<h2 class="doc-title">Comprovante de Pagamento</h2>
<p class="doc-subtitle" th:text="'Emitido em ' + ${dataEmissao}">—</p>

<div class="box">
    <div class="box-label">Valor pago</div>
    <div class="box-value" th:text="${valorPago}">R$ 0,00</div>
</div>

<div class="row">
    <div class="field">
        <div class="field-label">Descrição</div>
        <div class="field-value" th:text="${descricao}">—</div>
    </div>
    <div class="field">
        <div class="field-label">Beneficiário</div>
        <div class="field-value" th:text="${beneficiario}">—</div>
    </div>
</div>
<div class="row">
    <div class="field">
        <div class="field-label">Data de vencimento</div>
        <div class="field-value" th:text="${dataVencimento}">—</div>
    </div>
    <div class="field">
        <div class="field-label">Data do pagamento</div>
        <div class="field-value" th:text="${dataPagamento}">—</div>
    </div>
</div>
<div class="row">
    <div class="field">
        <div class="field-label">Forma de pagamento</div>
        <div class="field-value" th:text="${formaPagamento}">—</div>
    </div>
    <div class="field">
        <div class="field-label">Status</div>
        <div class="field-value"><span class="status-badge" th:classappend="${statusClass}" th:text="${statusDesc}">—</span></div>
    </div>
</div>
<div th:if="${referencia != null and !referencia.isEmpty()}" class="row">
    <div class="field">
        <div class="field-label">Referência (mês folha)</div>
        <div class="field-value" th:text="${referencia}">—</div>
    </div>
</div>

<div class="divider"></div>
<p style="font-size: 10pt; color: #64748b;"><strong>Valor total da conta:</strong> <span th:text="${valorTotal}">—</span></p>

<div class="footer">Documento gerado pelo VendaLume · Comprovante de pagamento · <span th:text="${dataEmissao}">—</span></div>
</body>
</html>
