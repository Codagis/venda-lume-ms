spring:
  application:
    name: commo

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev-h2}

  jackson:
    time-zone: America/Sao_Paulo

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: CommoHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    filter: true
    try-it-out-enabled: true

commo:
  jwt:
    secret: ${JWT_SECRET:}
    access-token-validity: ${JWT_ACCESS_VALIDITY:900}
    refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800}
