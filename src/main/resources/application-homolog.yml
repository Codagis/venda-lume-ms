# Ambiente: Homologação
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/vendalume-db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  devtools:
    restart:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

vendalume:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity: ${JWT_ACCESS_VALIDITY:900}
    refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800}

logging:
  level:
    com.vendalume: INFO
    org.springframework.web: INFO
