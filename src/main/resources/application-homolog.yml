# Ambiente: Homologação
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/vendalume-db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  devtools:
    restart:
      enabled: false

server:
  port: ${PORT:${SERVER_PORT:8080}}
  # Railway costuma operar com CPU/RAM limitados; compressão pode ajudar no tráfego,
  # mas mantemos como alternável para ajustar conforme o ambiente.
  compression:
    enabled: ${SERVER_COMPRESSION_ENABLED:false}
    min-response-size: 2048
  http2:
    enabled: false

vendalume:
  jwt:
    secret: ${JWT_SECRET}
    access-token-validity: ${JWT_ACCESS_VALIDITY:900}
    refresh-token-validity: ${JWT_REFRESH_VALIDITY:604800}

logging:
  level:
    com.vendalume: INFO
    org.springframework.web: INFO

springdoc:
  # Para produção/homologação no Railway, Swagger costuma ser desnecessário e gasta recursos.
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:false}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:false}
